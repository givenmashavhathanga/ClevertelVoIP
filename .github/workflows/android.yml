name: Build Clevertel VoIP APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x P2PSample_AndroidStudio/gradlew

      - name: Build Debug APK
        working-directory: P2PSample_AndroidStudio
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ClevertelVoIP-debug.apk
          path: P2PSample_AndroidStudio/P2PSample/build/outputs/apk/debug/*.apk
          retention-days: 30
