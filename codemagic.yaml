workflows:
  android-debug-build:
    name: Clevertel VoIP - Debug APK
    max_build_duration: 30
    environment:
      java: 17
      #android_signing:
        #- keystore_reference          # optional: remove if not signing
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Build debug APK
        script: |
          cd "$CM_BUILD_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - given@clevertel.co.za      # ← change this
        notify:
          success: true
          failure: true
          
